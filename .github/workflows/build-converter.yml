name: "build-converter"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          environment-file: linux-environment.yml
          python-version: '3.11.13'
          auto-activate-base: false
          activate-environment: twoD2threeD

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils imagemagick libgl1-mesa-glx

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew update
          brew install imagemagick poppler

      - name: Build with PyInstaller
        shell: bash -el {0}
        run: |
          conda activate twoD2threeD
          pyinstaller --onefile --collect-all "bpy" --add-data "assets:assets" main.py

      - name: Rename binary (Linux/macOS)
        run: mv dist/main dist/converter-${{ matrix.target }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: converter-${{ matrix.target }}
          path: dist/converter-${{ matrix.target }}

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/converter-${{ matrix.target }}
